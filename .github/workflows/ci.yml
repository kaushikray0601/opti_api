name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks-and-tests:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-django-secret-key
      OPTIMIZER_API_KEY: ci-optimizer-key
      DJANGO_DEBUG: "True"
      ENV_MODE: dev
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      CELERY_TASK_ALWAYS_EAGER: "True"
      CELERY_TASK_EAGER_PROPAGATES: "True"
      CELERY_TASK_STORE_EAGER_RESULT: "True"
      CELERY_BROKER_URL_EAGER: memory://
      CELERY_RESULT_BACKEND_EAGER: cache+memory://
      CSRF_COOKIE_SECURE: "False"
      SESSION_COOKIE_SECURE: "False"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run optimizer tests
        run: python manage.py test optimizer -v 2 --noinput

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build --build-arg DJANGO_SECRET_KEY=ci-django-secret-key -t opti-api-ci .
